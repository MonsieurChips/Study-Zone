services:
  - type: web
    name: studyzone-backend
    env: docker
    plan: free
    dockerContext: ./Fullstack-BE-main
    dockerfilePath: ./Fullstack-BE-main/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
